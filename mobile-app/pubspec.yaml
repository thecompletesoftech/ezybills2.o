name: ezybills_mobile
description: EzyBills Mobile App - Fast POS Billing for Mobile Devices
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0

  # HTTP & Networking
  dio: ^5.3.0
  connectivity_plus: ^5.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path: ^1.8.0

  # UI & Widgets
  cupertino_icons: ^1.0.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Localisation & Dates
  intl: ^0.19.0

  # Camera & Barcode
  mobile_scanner: ^3.5.0

  # Printing
  pdf: ^3.10.0
  printing: ^5.11.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.4.0
  firebase_messaging: ^14.7.0

  # File Handling & Permissions
  file_picker: ^8.0.0
  permission_handler: ^11.4.0

  # QR/Barcode Generation
  qr_flutter: ^4.1.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  uuid: ^4.0.0
  equatable: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
